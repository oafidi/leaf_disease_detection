# ─────────────────────────────────────────────────────────────────────────────
# ÉTAPE 1 — Utilisé UNIQUEMENT pendant l'obtention du certificat Let's Encrypt.
# Une fois le certificat obtenu, remplacer ce fichier par applescan-https.conf
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name TON_DOMAINE.COM www.TON_DOMAINE.COM;

    # Défi ACME pour Let's Encrypt (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → réponse temporaire pendant la phase d'initialisation
    location / {
        return 200 'AppleScan en cours de démarrage...';
        add_header Content-Type text/plain;
    }
}
